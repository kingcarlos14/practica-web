<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Figuras con texto</title>

    <style>
        body{
            display: flex;
            gap: 50px;
            padding: 50px;
            background-color: #222;
        }

        div{
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
        }

        .caja{
            width: 70px;
            height: 70px;
            background-color: black;
        }

        .rectangulo{
            width: 90px;
            height: 50px;
            background-color: blue;
            border: 6px dashed red;
        }

        .circulo{
            width: 100px;
            height: 100px;
            background-color: cyan;
            border-radius: 50%;
            border: 5px solid gray;
        }

        .cuadrado{
            width: 60px;
            height: 60px;
            background-color: green;
        }
    </style>
</head>

<body>

    <div class="caja">Hola</div>
    <div class="rectangulo">mundo</div>
    <div class="circulo">goo</div>
    <div class="cuadrado">wed</div>

</body>
</html>
